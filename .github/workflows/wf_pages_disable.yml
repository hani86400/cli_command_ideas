# Simple workflow for deploying static content to GitHub Pages
name: PAGES_DISABLE
on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main123"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  actions: write   # 👈 required for API call

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Disable Pages (API)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          echo "## 🔹 Disabling Pages (API)"  >> $GITHUB_STEP_SUMMARY
          echo "Disabling Pages..."
          if gh api /repos/${GITHUB_REPOSITORY}/pages > /dev/null 2>&1
          then
            gh api -X DELETE /repos/${GITHUB_REPOSITORY}/pages
            echo "Pages disabled"          
            echo "     Pages now disabled"
            echo "- ✅ Pages now disabled"   >> $GITHUB_STEP_SUMMARY
          else
            echo "     Pages already disabled"
            echo "- ⚠️ Pages already disabled"   >> $GITHUB_STEP_SUMMARY
          fi
