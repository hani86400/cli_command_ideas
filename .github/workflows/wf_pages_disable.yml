name: PAGES_DISABLE (API)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  actions: write

jobs:
  disable-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Disable Pages (API)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          echo "## 🔹 Disabling Pages (API)" >> $GITHUB_STEP_SUMMARY

          if gh api /repos/${GITHUB_REPOSITORY}/pages > /dev/null 2>&1
          then
            echo "Disabling Pages..."
            gh api -X DELETE /repos/${GITHUB_REPOSITORY}/pages

            echo "- ✅ Pages now disabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "Pages already disabled"
            echo "- ⚠️ Pages already disabled" >> $GITHUB_STEP_SUMMARY
          fi

